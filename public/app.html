<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경덕중학교 타자마스터 — 연습</title>
    <meta name="description" content="한글/영문 타자 연습 — 자리연습, 단어, 문장, 문단 모드">
    <link rel="stylesheet" href="css/main.css?v=1.4.2">
    <link rel="stylesheet" href="css/typing.css?v=1.4.2">
    <link rel="stylesheet" href="css/keyboard.css?v=1.4.2">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>

<body>

    <!-- 네비게이션 -->
    <nav class="nav">
        <div class="nav-inner">
            <a href="/app.html" class="nav-logo">
                <img src="/img/logo.png" alt="경덕중학교"
                    style="width:32px;height:32px;border-radius:50%;vertical-align:middle;margin-right:8px">
                경덕중학교 타자마스터
            </a>
            <div class="nav-user">
                <span id="nav-level" class="nav-level">Lv.1</span>
                <span id="nav-name" style="font-size:0.9rem;color:var(--text-secondary)"></span>
                <img id="nav-avatar" src="" alt="프로필" class="nav-avatar">
                <a href="/myrecords.html" class="btn-secondary" style="padding:8px 16px;font-size:0.85rem">📊 내 기록</a>
                <button id="btn-admin" class="btn-secondary hidden" style="padding:8px 16px;font-size:0.85rem"
                    onclick="location.href='/admin.html'">🛠 관리자</button>
                <button class="btn-icon" onclick="Auth.signOut()" title="로그아웃">🚪</button>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top:28px;padding-bottom:64px">

        <!-- EXP 바 -->
        <div style="margin-bottom:20px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                <div style="font-size:0.8rem;font-weight:700;color:var(--text-muted)">경험치</div>
                <div id="exp-text" style="font-size:0.8rem;color:var(--accent-cyan)"></div>
            </div>
            <div class="progress-bar-wrap">
                <div id="exp-bar" class="progress-bar-fill" style="width:0%"></div>
            </div>
        </div>

        <!-- ── 세션 설정 영역 ── -->
        <div id="section-setup" class="card" style="margin-bottom:24px">
            <div
                style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px">
                <h2 style="font-size:1.2rem;font-weight:900">🎮 연습 설정</h2>
                <div class="lang-toggle">
                    <button class="lang-btn active" id="btn-ko" onclick="setLang('ko')">한글</button>
                    <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
                </div>
            </div>

            <!-- 모드 선택 (6개 grid) -->
            <div
                style="display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,auto);gap:12px;margin-bottom:20px">
                <div class="mode-card" data-mode="keyboard_basic" onclick="setMode('keyboard_basic')">
                    <div class="mode-icon">⌨️</div>
                    <div class="mode-title">자리연습(기초)</div>
                    <div class="mode-desc">자음·모음 익히기</div>
                </div>
                <div class="mode-card" data-mode="keyboard_word" onclick="setMode('keyboard_word')">
                    <div class="mode-icon">🔡</div>
                    <div class="mode-title">자리연습(단어)</div>
                    <div class="mode-desc">단어로 자리 익히기</div>
                </div>
                <div class="mode-card selected" data-mode="word" onclick="setMode('word')">
                    <div class="mode-icon">📝</div>
                    <div class="mode-title">단어 연습</div>
                    <div class="mode-desc">단어로 손가락 풀기</div>
                </div>
                <div class="mode-card" data-mode="sentence" onclick="setMode('sentence')">
                    <div class="mode-icon">💬</div>
                    <div class="mode-title">문장 연습</div>
                    <div class="mode-desc">속담·명언 한 문장</div>
                </div>
                <div class="mode-card" data-mode="paragraph" onclick="setMode('paragraph')">
                    <div class="mode-icon">📖</div>
                    <div class="mode-title">문단 연습</div>
                    <div class="mode-desc">긴 지문 도전</div>
                </div>
                <div class="mode-card" data-mode="minigame" onclick="location.href='/bubble.html'">
                    <div class="mode-icon">🫧</div>
                    <div class="mode-title">버블 슈터</div>
                    <div class="mode-desc">단어로 버블 격파!</div>
                </div>
            </div>

            <!-- 화면 키보드 ON/OFF 토글 -->
            <div
                style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:12px 16px;background:var(--bg-primary);border-radius:var(--radius-sm)">
                <span style="font-size:0.9rem;font-weight:600;flex:1">화면 키보드 표시</span>
                <label class="toggle">
                    <input type="checkbox" id="toggle-keyboard-vis" checked onchange="toggleKeyboardDisplay()">
                    <span class="toggle-slider"></span>
                </label>
                <span style="font-size:0.8rem;color:var(--text-muted)" id="kb-vis-label">ON</span>
            </div>

            <button id="btn-start" class="btn-primary w-full" style="justify-content:center;font-size:1.1rem"
                onclick="startSession()">
                연습 시작 ▶
            </button>
        </div>

        <!-- ── 타자 연습 영역 ── -->
        <div id="section-typing" class="hidden">

            <!-- 실시간 통계 -->
            <div class="stats-bar" style="margin-bottom:16px">
                <div class="stat-box">
                    <div class="label">타수</div>
                    <div class="value" id="stat-wpm">0</div>
                </div>
                <div class="stat-box accuracy">
                    <div class="label">정확도</div>
                    <div class="value" id="stat-acc">100%</div>
                </div>
                <div class="stat-box timer">
                    <div class="label">시간</div>
                    <div class="value" id="stat-time">00:00</div>
                </div>
                <div class="stat-box combo">
                    <div class="label">콤보</div>
                    <div class="value" id="stat-combo">0</div>
                </div>
            </div>

            <!-- 텍스트 디스플레이 -->
            <div class="card" style="margin-bottom:16px;padding:20px">
                <div id="typing-display" class="typing-display" style="margin-bottom:12px"></div>
                <div id="combo-display" class="combo-display"></div>
                <textarea id="typing-input" class="typing-input" rows="3" placeholder="여기에 타이핑하세요..." autocomplete="off"
                    autocorrect="off" autocapitalize="off" spellcheck="false" style="margin-top:12px"></textarea>
                <div style="display:flex;gap:12px;margin-top:12px">
                    <button class="btn-secondary" onclick="skipSession()" style="flex:1;justify-content:center">⟳ 새
                        문장</button>
                    <button class="btn-danger" onclick="showSetup()" style="flex:1">✕ 나가기</button>
                </div>
            </div>

            <!-- 화면 키보드 -->
            <div id="keyboard-container" class="card" style="margin-bottom:16px;padding:16px">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
                    <span style="font-size:0.8rem;font-weight:700;color:var(--text-muted)">⌨️ 화면 키보드</span>
                    <span style="font-size:0.75rem;color:var(--text-muted)">
                        <span style="color:var(--accent-green)">■</span> 정타 &nbsp;
                        <span style="color:var(--accent-red)">■</span> 오타 &nbsp;
                        <span style="color:var(--accent-cyan)">■</span> 다음 키
                    </span>
                </div>
                <div id="kb-display"></div>
            </div>

        </div>

        <!-- ── 결과 영역 ── -->
        <div id="section-result" class="card hidden" style="margin-bottom:24px">
            <div id="result-content"></div>
        </div>

        <!-- ── 랭킹 영역 ── -->
        <div id="section-ranking" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <div class="card" id="card-class-ranking">
                <h3 style="font-size:1rem;font-weight:900;margin-bottom:16px">📋 학반 랭킹 <span id="class-ranking-label"
                        style="font-size:0.8rem;color:var(--text-muted)">(타수 기준)</span></h3>
                <table class="ranking-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>이름</th>
                            <th>타수</th>
                            <th>Lv</th>
                        </tr>
                    </thead>
                    <tbody id="class-ranking-body"></tbody>
                </table>
            </div>
            <div class="card" id="card-grade-ranking">
                <h3 style="font-size:1rem;font-weight:900;margin-bottom:16px">🏫 학년 랭킹 <span id="grade-ranking-label"
                        style="font-size:0.8rem;color:var(--text-muted)">(타수 기준)</span></h3>
                <table class="ranking-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>이름</th>
                            <th>학반</th>
                            <th>타수</th>
                        </tr>
                    </thead>
                    <tbody id="grade-ranking-body"></tbody>
                </table>
            </div>
        </div>

    </div><!-- /container -->

    <!-- 레벨업 오버레이 -->
    <div id="levelup-overlay" class="levelup-overlay hidden">
        <div class="levelup-card">
            <div class="levelup-emoji">🎉</div>
            <div class="levelup-title" id="levelup-title">레벨 업!</div>
            <div class="levelup-subtitle" id="levelup-subtitle"></div>
            <button class="btn-primary" style="margin-top:24px" onclick="closeLevelUp()">계속하기</button>
        </div>
    </div>

    <script src="js/firebase-config.js?v=1.4.2"></script>
    <script src="js/auth.js?v=1.4.2"></script>
    <script src="js/profile.js?v=1.4.2"></script>
    <script src="js/content.js?v=1.4.2"></script>
    <script src="js/records.js?v=1.4.2"></script>
    <script src="js/game.js?v=1.4.2"></script>
    <script src="js/typing-engine.js?v=1.4.2"></script>
    <script src="js/keyboard.js?v=1.4.2"></script>
    <script>
        let currentUser = null;
        let userProfile = null;
        let isAdminUser = false;
        let currentLang = 'ko';
        let currentMode = 'word';
        let comboCount = 0;
        let showKeyboard = true;
        let timerInterval = null;
        let sessionText = '';

        // ── 인증 ──────────────────────────────────────────────
        Auth.initAuthListener({
            requireAuth: true,
            onLogin: async (user, admin) => {
                currentUser = user;
                isAdminUser = admin;

                const profile = await Profile.getProfile(user.uid);
                if (!profile?.profileComplete) { location.href = '/profile.html'; return; }
                userProfile = profile;

                document.getElementById('nav-name').textContent = profile.name;
                document.getElementById('nav-avatar').src = user.photoURL || '';
                if (admin) document.getElementById('btn-admin').classList.remove('hidden');

                updateExpBar(profile.totalExp || 0);
                loadRankings();
                await Content.initializeDefaults();

                // 화면 키보드 초기 렌더 (커스텀 위치 포함)
                const kbSettings = await Records.getKeyboardSettings();
                const opacity = kbSettings?._handOpacity !== undefined ? kbSettings._handOpacity : 0.5;
                KeyboardDisplay.render(document.getElementById('kb-display'), currentLang, {
                    customPositions: kbSettings,
                    opacity: opacity
                });
            }
        });

        // ── EXP 바 ────────────────────────────────────────────
        function updateExpBar(totalExp) {
            const level = Game.calcLevel(totalExp);
            const progress = Game.levelProgress(totalExp);
            const toNext = Game.expToNextLevel(totalExp);
            document.getElementById('nav-level').textContent =
                `Lv.${level} ${Game.getLevelTitle(level)}`;
            document.getElementById('exp-bar').style.width = progress + '%';
            document.getElementById('exp-text').textContent =
                toNext > 0 ? `다음 레벨까지 ${toNext} EXP` : '최고 레벨!';
        }

        // ── 언어 / 모드 선택 ──────────────────────────────────
        function setLang(lang) {
            currentLang = lang;
            document.getElementById('btn-ko').classList.toggle('active', lang === 'ko');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            KeyboardDisplay.setLang(lang);
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-card').forEach(c =>
                c.classList.toggle('selected', c.dataset.mode === mode));
        }

        function toggleKeyboardDisplay() {
            showKeyboard = document.getElementById('toggle-keyboard-vis').checked;
            document.getElementById('kb-vis-label').textContent = showKeyboard ? 'ON' : 'OFF';
        }

        let accumulatedKeystrokes = 0;
        let accumulatedErrors = 0;
        let accumulatedDuration = 0;
        let sessionStartTime = 0;

        // ── 한글 타이핑 시퀀스 분해기 ────────────────────────
        function getTypingSequence(str) {
            const CHO = ['ㄱ', 'ㄲ', 'ㄴ', 'ㄷ', 'ㄸ', 'ㄹ', 'ㅁ', 'ㅂ', 'ㅃ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅉ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
            const JUNG = ['ㅏ', 'ㅐ', 'ㅑ', 'ㅒ', 'ㅓ', 'ㅔ', 'ㅕ', 'ㅖ', 'ㅗ', 'ㅘ', 'ㅙ', 'ㅚ', 'ㅛ', 'ㅜ', 'ㅝ', 'ㅞ', 'ㅟ', 'ㅠ', 'ㅡ', 'ㅢ', 'ㅣ'];
            const JONG = ['', 'ㄱ', 'ㄲ', 'ㄳ', 'ㄴ', 'ㄵ', 'ㄶ', 'ㄷ', 'ㄹ', 'ㄺ', 'ㄻ', 'ㄼ', 'ㄽ', 'ㄾ', 'ㄿ', 'ㅀ', 'ㅁ', 'ㅂ', 'ㅄ', 'ㅅ', 'ㅆ', 'ㅇ', 'ㅈ', 'ㅊ', 'ㅋ', 'ㅌ', 'ㅍ', 'ㅎ'];
            const COMP = {
                'ㅘ': ['ㅗ', 'ㅏ'], 'ㅙ': ['ㅗ', 'ㅐ'], 'ㅚ': ['ㅗ', 'ㅣ'], 'ㅝ': ['ㅜ', 'ㅓ'],
                'ㅞ': ['ㅜ', 'ㅔ'], 'ㅟ': ['ㅜ', 'ㅣ'], 'ㅢ': ['ㅡ', 'ㅣ'],
                'ㄳ': ['ㄱ', 'ㅅ'], 'ㄵ': ['ㄴ', 'ㅈ'], 'ㄶ': ['ㄴ', 'ㅎ'], 'ㄺ': ['ㄹ', 'ㄱ'],
                'ㄻ': ['ㄹ', 'ㅁ'], 'ㄼ': ['ㄹ', 'ㅂ'], 'ㄽ': ['ㄹ', 'ㅅ'], 'ㄾ': ['ㄹ', 'ㅌ'],
                'ㄿ': ['ㄹ', 'ㅍ'], 'ㅀ': ['ㄹ', 'ㅎ'], 'ㅄ': ['ㅂ', 'ㅅ']
            };

            let seq = [];
            for (let i = 0; i < str.length; i++) {
                let char = str[i];
                let code = char.charCodeAt(0);
                if (code >= 0xAC00 && code <= 0xD7A3) { // 완성형 한글
                    const offset = code - 0xAC00;
                    seq.push(CHO[Math.floor(offset / 28 / 21)]);
                    let jung = JUNG[Math.floor(offset / 28) % 21];
                    COMP[jung] ? seq.push(...COMP[jung]) : seq.push(jung);
                    let jong = JONG[offset % 28];
                    if (jong) { COMP[jong] ? seq.push(...COMP[jong]) : seq.push(jong); }
                } else {
                    COMP[char] ? seq.push(...COMP[char]) : seq.push(char);
                }
            }
            return seq;
        }

        // ── 세션 시작 ──────────────────────────────────────────
        async function startSession(isContinuing = false) {
            if (!isContinuing) {
                accumulatedKeystrokes = 0;
                accumulatedErrors = 0;
                accumulatedDuration = 0;
                sessionStartTime = Date.now();
            }

            // 기초 모드의 경우 언어가 명확히 정해져 있으므로 자동 전환
            if (currentMode === 'keyboard_basic') setLang('ko');
            else if (currentMode === 'keyboard_basic_en') setLang('en');

            const modeKey = currentMode === 'keyboard_basic' ? 'keyboard_basic'
                : currentMode === 'keyboard_basic_en' ? 'keyboard_basic' // content.js 에서는 뒤에 _en 이 붙음
                    : currentMode === 'keyboard_word' ? 'keyboard_word'
                        : currentMode === 'word' ? 'words'
                            : currentMode === 'sentence' ? 'sentences'
                                : 'paragraphs';

            // keyboard_basic_en 의 경우 modeKey: 'keyboard_basic', currentLang: 'en' 이 되어 'keyboard_basic_en' 조합이 됨.
            const contentKey = `${modeKey}_${currentLang}`;
            const items = await Content.getContent(contentKey);
            if (!items.length) { alert('콘텐츠가 없습니다.'); return; }

            // 키보드 커스텀 위치 로드
            const kbSettings = await Records.getKeyboardSettings();
            const opacity = kbSettings?._handOpacity !== undefined ? kbSettings._handOpacity : 0.5;
            KeyboardDisplay.render(document.getElementById('kb-display'), currentLang, {
                customPositions: kbSettings,
                opacity: opacity
            });
            if (currentMode === 'word') {
                sessionText = Content.getRandom(items, 5).join(' ');
            } else {
                sessionText = Content.getRandom(items, 1)[0];
            }

            comboCount = 0;
            document.getElementById('stat-combo').textContent = '0';

            if (!isContinuing) {
                document.getElementById('stat-wpm').textContent = '0';
                document.getElementById('stat-acc').textContent = '100%';
                document.getElementById('stat-time').textContent = '00:00';
            }

            const displayEl = document.getElementById('typing-display');
            const inputEl = document.getElementById('typing-input');
            inputEl.value = '';
            inputEl.disabled = false;
            displayEl.classList.toggle('lang-en', currentLang === 'en');

            // 타자 엔진 초기화
            let lastLen = 0;
            TypingEngine.init({
                text: sessionText,
                mode: currentMode,
                lang: currentLang,
                onUpdate: ({ wpm, accuracy, elapsed }) => {
                    // 전체 누적 수치로 화면 업데이트
                    const totalSec = accumulatedDuration + elapsed;
                    const totalChars = (accumulatedKeystrokes + (inputEl.value.length || 0)) - (accumulatedErrors + (TypingEngine.state?.errors || 0));

                    document.getElementById('stat-wpm').textContent = totalSec > 0 ? TypingEngine.calcWPM(Math.max(0, totalChars), totalSec, currentLang) : 0;
                    document.getElementById('stat-acc').textContent = (accumulatedKeystrokes + (inputEl.value.length || 0)) > 0
                        ? TypingEngine.calcAccuracy((accumulatedKeystrokes + (inputEl.value.length || 0)), (accumulatedErrors + (TypingEngine.state?.errors || 0))) + '%'
                        : '100%';
                    document.getElementById('stat-time').textContent = TypingEngine.formatTime(totalSec);
                },
                onComplete: async (result) => {
                    clearInterval(timerInterval);

                    accumulatedKeystrokes += result.keystrokes;
                    accumulatedErrors += result.errors;
                    accumulatedDuration += result.duration;

                    // 문단 연습이 아닌 경우(자리, 단어, 문장) 결과창으로 가지 않고 무한 반복 진행
                    if (currentMode !== 'paragraph') {
                        // 중간 백그라운드 저장 무시 (최종 나가기에서 일괄 저장)
                        startSession(true); // 계속 진행
                    } else {
                        // 문단 모드는 기존대로 즉시 저장하고 결과창으로 이동
                        saveAndShowResult(result);
                    }
                }
            });

            TypingEngine.renderText(displayEl, '');
            // KeyboardDisplay.render는 위에서 한 번만 호출되도록 함 (중복 제거)
            // 화면 키보드 리셋 + 첫 글자 힌트 (자소 분해 적용)
            const initialSeq = getTypingSequence(sessionText);
            if (initialSeq.length > 0) {
                KeyboardDisplay.highlightNext(initialSeq[0]);
            } else {
                KeyboardDisplay.highlightNext(sessionText[0]);
            }

            // ── 자리연습 기초 모드용 커스텀 입력 버퍼 ──
            // IME와 싸우지 않도록 물리적 키 입력만 추적하여 화면에 그림
            let basicPracticeBuffer = [];
            if (currentMode === 'keyboard_basic') {
                inputEl.value = '';
            }

            // 입력 이벤트
            // 정타/오타 판정: oninput이 발생할 때 val 전체를 sessionText와 비교
            inputEl.oninput = (e) => {
                if (currentMode === 'keyboard_basic') {
                    // 키보드 기초 모드에서는 브라우저의 기본 변경을 차단하고 
                    // basicPracticeBuffer의 내용으로 강제 덮어씌움
                    inputEl.value = basicPracticeBuffer.join('');
                }

                const val = inputEl.value;
                const cleanVal = val.replace(/\r?\n|\r/g, '').trimEnd();
                const cleanTarget = sessionText.trimEnd();

                TypingEngine.processInput(inputEl, displayEl, true);

                // 글자가 추가된 경우 (일반 타이핑 + 조합 완성 모두 처리)
                if (val.length > lastLen) {
                    // 새로 추가된 글자 (영문 / 완성된 한글 음절)
                    const newChar = val[val.length - 1];
                    const expected = sessionText[val.length - 1];
                    const isCorrect = newChar === expected;
                    isCorrect ? comboCount++ : (comboCount = 0);
                    document.getElementById('stat-combo').textContent = comboCount;
                } else if (val.length < lastLen) {
                    // 백스페이스
                    comboCount = 0;
                    document.getElementById('stat-combo').textContent = '0';
                }

                // 오타가 나더라도 현재 치고 있는/쳐야 할 글자의 다음 자소를 안내
                let nextExpectedChar = null;

                if (val.length === 0) {
                    const seq = getTypingSequence(sessionText[0]);
                    nextExpectedChar = seq[0];
                } else if (val.length > sessionText.length) {
                    nextExpectedChar = 'Enter';
                } else {
                    const currentIndex = val.length - 1;
                    const targetChar = sessionText[currentIndex];
                    const typedChar = val[currentIndex];

                    const targetSeq = getTypingSequence(targetChar);
                    const typedSeq = getTypingSequence(typedChar);

                    if (typedSeq.length < targetSeq.length) {
                        nextExpectedChar = targetSeq[typedSeq.length];
                    } else {
                        if (currentIndex + 1 < sessionText.length) {
                            const nextTargetChar = sessionText[currentIndex + 1];
                            const nextTargetSeq = getTypingSequence(nextTargetChar);
                            nextExpectedChar = nextTargetSeq[0];
                        } else {
                            nextExpectedChar = 'Enter';
                        }
                    }
                }

                if (nextExpectedChar) KeyboardDisplay.highlightNext(nextExpectedChar);
                else KeyboardDisplay.highlightNext('Enter');

                lastLen = val.length;
            };

            // ★ keydown — 물리 키(e.code)를 기준으로 즉시 시각 피드백
            // 한글 IME에서도 e.code는 항상 실제 눌린 물리 키를 가리킴
            inputEl.onkeydown = (e) => {
                // 특수키
                if (e.key === 'Backspace') {
                    KeyboardDisplay.pressKey('Backspace', true);
                    if (currentMode === 'keyboard_basic') {
                        e.preventDefault();
                        if (basicPracticeBuffer.length > 0) {
                            basicPracticeBuffer.pop();
                            inputEl.value = basicPracticeBuffer.join('');
                            inputEl.dispatchEvent(new Event('input', { bubbles: true }));
                        }
                    }
                    return;
                }
                if (e.key === 'Enter' || e.keyCode === 13) {
                    KeyboardDisplay.pressKey('Enter', true);
                    e.preventDefault(); // 엔터 입력 시 개행 넘어가는 것 방지
                    if (TypingEngine.checkComplete(inputEl)) {
                        // 성공적으로 엔터를 눌러 문장/단어가 완료된 경우,
                        // onComplete가 내부적으로 실행되어 다음 세션으로 넘어감
                    }
                    return;
                }
                if (e.key === ' ') {
                    KeyboardDisplay.pressKey('Space', true);
                    if (currentMode === 'keyboard_basic') {
                        e.preventDefault();
                        basicPracticeBuffer.push(' ');
                        inputEl.value = basicPracticeBuffer.join('');
                        inputEl.dispatchEvent(new Event('input', { bubbles: true }));
                    }
                    return;
                }

                // 물리 키 코드에서 단일 문자 키 추출
                // e.code: 'KeyA' → 'a', 'Digit1' → '1', 'Semicolon' → ';' 등
                let physKey = null;
                if (e.code.startsWith('Key')) {
                    physKey = e.code.slice(3).toLowerCase(); // 'KeyA' → 'a'
                } else if (e.code.startsWith('Digit')) {
                    physKey = e.code.slice(5);               // 'Digit1' → '1'
                } else {
                    // 키보드 레이아웃의 특수 문자 매핑
                    const codeMap = {
                        'Backquote': '`', 'Minus': '-', 'Equal': '=',
                        'BracketLeft': '[', 'BracketRight': ']', 'Backslash': '\\',
                        'Semicolon': ';', 'Quote': "'",
                        'Comma': ',', 'Period': '.', 'Slash': '/'
                    };
                    if (codeMap[e.code]) {
                        physKey = codeMap[e.code];
                    } else if (e.key.length === 1) {
                        physKey = e.key.toLowerCase();
                    }
                }

                if (!physKey) return;

                // 정타 여부: 현재 입력값 + 이 키로 만들어질 다음 글자가 맞는지 추정
                // 영문: physKey === sessionText[inputEl.value.length] (대/소 무시)
                // 한글: KO_MAP[physKey] 혹은 KO_MAP[physKey.toUpperCase()]가 다음 자소와 일치
                const pos = inputEl.value.length; // 커서 위치 (현재 입력 길이)
                const expectedChar = sessionText[pos] || '';

                // KO_MAP은 keyboard.js 내부 const이므로 여기서 다시 선언 (작은 복사본)
                const KO = {
                    'q': 'ㅂ', 'w': 'ㅈ', 'e': 'ㄷ', 'r': 'ㄱ', 't': 'ㅅ',
                    'y': 'ㅛ', 'u': 'ㅕ', 'i': 'ㅑ', 'o': 'ㅐ', 'p': 'ㅔ',
                    'a': 'ㅁ', 's': 'ㄴ', 'd': 'ㅇ', 'f': 'ㄹ', 'g': 'ㅎ',
                    'h': 'ㅗ', 'j': 'ㅓ', 'k': 'ㅏ', 'l': 'ㅣ',
                    'z': 'ㅋ', 'x': 'ㅌ', 'c': 'ㅊ', 'v': 'ㅍ', 'b': 'ㅠ', 'n': 'ㅜ', 'm': 'ㅡ',
                    'Q': 'ㅃ', 'W': 'ㅉ', 'E': 'ㄸ', 'R': 'ㄲ', 'T': 'ㅆ', 'O': 'ㅒ', 'P': 'ㅖ',
                };

                let isCorrect = false;
                let charToAppend = '';
                if (currentLang === 'ko') {
                    // 한글: Shift 키가 눌렸을 경우 대문자로 매핑하여 된소리/이중모음 처리
                    let lookupKey = e.shiftKey ? physKey.toUpperCase() : physKey;
                    const jaso = KO[lookupKey] || lookupKey;
                    charToAppend = jaso;
                    // 간단 판정: 기대글자가 자소를 포함하면 정타로 간주
                    isCorrect = expectedChar.includes(jaso) || expectedChar === jaso;
                } else {
                    // 영문: 대소문자 무시 비교 및 Shift 적용된 문자열 추출
                    charToAppend = e.shiftKey ? physKey.toUpperCase() : physKey;
                    isCorrect = physKey.toLowerCase() === expectedChar.toLowerCase();
                }

                KeyboardDisplay.pressKey(physKey, isCorrect);

                // ★ 키보드 자리연습: 브라우저 기본 조합 방지 및 개별 문자 입력
                if (currentMode === 'keyboard_basic') {
                    e.preventDefault(); // 기본 IME 입력 완전 차단 (더블 문자 버그 해결)
                    if (charToAppend.length === 1) {
                        basicPracticeBuffer.push(charToAppend);
                        inputEl.value = basicPracticeBuffer.join('');
                        inputEl.dispatchEvent(new Event('input', { bubbles: true })); // TypingEngine 트리거
                    }
                }
            };

            // 화면 전환
            document.getElementById('section-setup').classList.add('hidden');
            document.getElementById('section-result').classList.add('hidden');
            document.getElementById('section-typing').classList.remove('hidden');
            document.getElementById('keyboard-container').classList.toggle('hidden', !showKeyboard);

            // 포커스 및 스크롤 이동
            inputEl.focus();
            setTimeout(() => {
                document.getElementById('section-typing').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 50);
        }

        function skipSession() { startSession(true); }

        function showSetup() {
            clearInterval(timerInterval);

            // 만약 현재 무한 반복 모드(자리, 단어, 문장) 라면 여태까지 누적된 수치로 결과를 먼저 보여줌
            if (currentMode !== 'paragraph' && accumulatedKeystrokes > 0) {
                // 현재 입력 중이던(타이핑 엔진에 남은) 데이터 합산
                const currentElapsed = TypingEngine.state?.startTime ? (Date.now() - TypingEngine.state.startTime) / 1000 : 0;
                const currentTyped = document.getElementById('typing-input').value.length || 0;
                const currentErrors = TypingEngine.state?.errors || 0;

                const finalKeystrokes = accumulatedKeystrokes + currentTyped;
                const finalErrors = accumulatedErrors + currentErrors;
                const finalDuration = Math.floor(accumulatedDuration + currentElapsed);
                const correctChars = finalKeystrokes - finalErrors;

                const sessionResult = {
                    mode: currentMode,
                    lang: currentLang,
                    wpm: TypingEngine.calcWPM(Math.max(0, correctChars), finalDuration, currentLang),
                    cpm: finalDuration > 0 ? Math.round((correctChars / finalDuration) * 60) : 0,
                    accuracy: TypingEngine.calcAccuracy(finalKeystrokes, finalErrors),
                    duration: finalDuration,
                    keystrokes: finalKeystrokes,
                    errors: finalErrors,
                };

                // 누적된 결과창으로 보내기
                saveAndShowResult(sessionResult);
            } else {
                // 기존 단순 복귀 (입력이 아예 없었거나 문단 모드 중간 나갈시)
                document.getElementById('section-typing').classList.add('hidden');
                document.getElementById('section-result').classList.add('hidden');
                document.getElementById('section-setup').classList.remove('hidden');
            }
        }

        // ── 결과 저장 및 표시 ──────────────────────────────────
        async function saveAndShowResult(result) {
            document.getElementById('section-typing').classList.add('hidden');

            const expGained = Game.calcExp(result);
            const prevExp = userProfile.totalExp || 0;
            const prevLevel = Game.calcLevel(prevExp);
            const newExp = prevExp + expGained;
            const newLevel = Game.calcLevel(newExp);
            const newTotalKeys = (userProfile.totalKeystrokes || 0) + result.keystrokes;
            const newBadges = Game.checkBadges(userProfile, result, newTotalKeys);

            try {
                await Records.save(currentUser.uid, userProfile, result);
                const updateData = {
                    totalExp: firebase.firestore.FieldValue.increment(expGained),
                    level: newLevel,
                    totalKeystrokes: firebase.firestore.FieldValue.increment(result.keystrokes),
                };
                if (newBadges.length) updateData.badges = firebase.firestore.FieldValue.arrayUnion(...newBadges);
                await db.collection('users').doc(currentUser.uid).update(updateData);
            } catch (e) { console.error('저장 오류:', e); }

            userProfile.totalExp = newExp;
            userProfile.level = newLevel;
            userProfile.totalKeystrokes = newTotalKeys;
            userProfile.badges = [...(userProfile.badges || []), ...newBadges];

            updateExpBar(newExp);

            if (newLevel > prevLevel) {
                document.getElementById('levelup-title').textContent = `Lv.${newLevel} 달성!`;
                document.getElementById('levelup-subtitle').textContent = Game.getLevelTitle(newLevel);
                document.getElementById('levelup-overlay').classList.remove('hidden');
            }

            document.getElementById('result-content').innerHTML =
                Game.renderResult(result, expGained, newLevel, newBadges);
            document.getElementById('section-result').classList.remove('hidden');

            // 랭킹 갱신
            loadRankings();
        }

        function closeLevelUp() {
            document.getElementById('levelup-overlay').classList.add('hidden');
        }
        window.startNextSession = () => {
            document.getElementById('section-result').classList.add('hidden');
            startSession();
        };
        window.showMyRecords = () => { location.href = '/myrecords.html'; };

        // ── 랭킹 로드 ──────────────────────────────────────────
        async function loadRankings() {
            if (!userProfile) return;
            const settings = await Records.getRankingSettings();
            const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
            const classCard = document.getElementById('card-class-ranking');
            const gradeCard = document.getElementById('card-grade-ranking');

            if (!settings.classRankingEnabled) {
                classCard.classList.add('hidden');
            } else {
                classCard.classList.remove('hidden');
                document.getElementById('class-ranking-label').textContent = userProfile.className;
                const classRank = await Records.getClassRanking(userProfile.className);
                document.getElementById('class-ranking-body').innerHTML = classRank.length
                    ? classRank.map((r, i) => `
            <tr class="rank-${i + 1}">
              <td>${medals[i] || i + 1}</td>
              <td>${r.name}</td>
              <td><strong>${r.bestWpm}</strong></td>
              <td>Lv.${r.level}</td>
            </tr>`).join('')
                    : '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:24px">아직 기록 없음</td></tr>';
            }

            if (!settings.gradeRankingEnabled) {
                gradeCard.classList.add('hidden');
            } else {
                gradeCard.classList.remove('hidden');
                document.getElementById('grade-ranking-label').textContent = `${userProfile.grade}학년`;
                const gradeRank = await Records.getGradeRanking(userProfile.grade);
                document.getElementById('grade-ranking-body').innerHTML = gradeRank.length
                    ? gradeRank.map((r, i) => `
            <tr class="rank-${i + 1}">
              <td>${medals[i] || i + 1}</td>
              <td>${r.name}</td>
              <td>${r.className}</td>
              <td><strong>${r.bestWpm}</strong></td>
            </tr>`).join('')
                    : '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:24px">아직 기록 없음</td></tr>';
            }
        }
    </script>
