<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>경덕중학교 타자마스터 — 로그인</title>
  <meta name="description" content="학생 타자 연습 관리 플랫폼. Google 로그인으로 시작하세요.">
  <link rel="stylesheet" href="css/main.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>

<body>
  <div class="page-center">
    <div class="login-wrap">

      <!-- 로고 -->
      <div class="login-logo">
        <img src="/img/logo.png" alt="경덕중학교 로고"
          style="width:100px;height:100px;border-radius:50%;margin-bottom:16px;box-shadow:0 0 28px rgba(0,212,255,0.3)">
        <h1 class="logo-title text-gradient">경덕중학교<br>타자마스터</h1>
        <p class="logo-subtitle">경덕중학교 타자 연습 플랫폼</p>
      </div>

      <!-- 로그인 카드 -->
      <div id="card-google-login" class="card login-card">
        <h2 class="login-heading">시작하기</h2>
        <p class="login-desc">Google 계정으로 로그인하면<br>바로 연습을 시작할 수 있어요!</p>

        <button id="btn-google-login" class="btn-google">
          <svg viewBox="0 0 48 48" width="22" height="22">
            <path fill="#EA4335"
              d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
            <path fill="#4285F4"
              d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
            <path fill="#FBBC05"
              d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
            <path fill="#34A853"
              d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
          </svg>
          Google로 로그인
        </button>

        <div id="login-error" class="login-error hidden"></div>
      </div>

      <!-- 2차 비밀번호 설정 카드 -->
      <div id="card-pw-setup" class="card login-card hidden">
        <h2 class="login-heading">비밀번호 설정</h2>
        <p class="login-desc" style="margin-bottom:16px;">안전한 연습을 위해<br>나만의 2차 비밀번호를 설정해주세요.</p>
        <div class="form-group" style="text-align:left; margin-bottom:16px;">
          <input type="password" id="input-pw-setup" class="input-field" placeholder="새 비밀번호 (4자리 이상) 입력"
            maxlength="20">
        </div>
        <button id="btn-pw-setup" class="btn-primary" style="width:100%; justify-content:center;">설정 완료</button>
        <button class="btn-secondary" style="width:100%; justify-content:center; margin-top:8px;"
          onclick="cancelLogin()">취소</button>
        <div id="pw-setup-error" class="login-error hidden"></div>
      </div>

      <!-- 2차 비밀번호 입력 카드 -->
      <div id="card-pw-verify" class="card login-card hidden">
        <h2 class="login-heading">비밀번호 확인</h2>
        <p class="login-desc" style="margin-bottom:16px;">본인 확인을 위해<br>설정한 2차 비밀번호를 입력해주세요.</p>
        <div class="form-group" style="text-align:left; margin-bottom:16px;">
          <input type="password" id="input-pw-verify" class="input-field" placeholder="비밀번호 입력">
        </div>
        <button id="btn-pw-verify" class="btn-primary" style="width:100%; justify-content:center;">확인</button>
        <button class="btn-secondary" style="width:100%; justify-content:center; margin-top:8px;"
          onclick="cancelLogin()">취소</button>
        <div id="pw-verify-error" class="login-error hidden"></div>
      </div>

      <!-- 특징 소개 -->
      <div class="features-grid">
        <div class="feature-item">
          <div class="feature-icon">🎮</div>
          <div class="feature-text">
            <strong>게임처럼 즐기는 연습</strong>
            <span>레벨, EXP, 뱃지로 동기부여</span>
          </div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">📊</div>
          <div class="feature-text">
            <strong>누적 기록 관리</strong>
            <span>WPM, 정확도, 타수 추적</span>
          </div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">🏆</div>
          <div class="feature-text">
            <strong>학급·학년 랭킹</strong>
            <span>친구들과 함께 경쟁</span>
          </div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">🌏</div>
          <div class="feature-text">
            <strong>한글·영문 동시 연습</strong>
            <span>단어·문장·문단 3가지 모드</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // ① 이전 fresh 플래그 초기화
    Auth.clearFreshLogin();

    let _signingOut = true; // signOut 중에는 onLogin 무시
    let _currentUser = null;
    let _hasProfile = false;
    let _dbSecondaryPassword = null;

    // 로그인 진행 취소
    async function cancelLogin() {
      Auth.clearFreshLogin();
      await auth.signOut();
      window.location.reload();
    }

    // ② 리스너 먼저 등록
    Auth.initAuthListener({
      onLogin: async (user) => {
        if (_signingOut) return;          // signOut 처리 중이면 무시
        _currentUser = user;

        // Firestore에서 유저 정보 확인
        const userDoc = await db.collection('users').doc(user.uid).get();
        _hasProfile = userDoc.exists && userDoc.data().profileComplete === true;

        let secondaryPw = null;
        if (userDoc.exists) {
          const ud = userDoc.data();
          if (ud.banned === true) {
            alert('🚫 시스템에 의해 접근이 영구 차단된 계정입니다.\n문의사항이 있다면 관리자(선생님)에게 연락해 주세요.');
            await cancelLogin();
            return;
          }
          secondaryPw = ud.secondaryPassword;
        }

        document.getElementById('card-google-login').classList.add('hidden');

        if (secondaryPw) {
          // 비밀번호가 이미 설정된 경우
          _dbSecondaryPassword = secondaryPw;
          document.getElementById('card-pw-verify').classList.remove('hidden');
          setTimeout(() => document.getElementById('input-pw-verify').focus(), 100);
        } else {
          // 비밀번호가 설정되지 않은 경우
          document.getElementById('card-pw-setup').classList.remove('hidden');
          setTimeout(() => document.getElementById('input-pw-setup').focus(), 100);
        }
      }
    });

    // ③ 기존 Firebase 세션 강제 종료
    auth.signOut().then(() => { _signingOut = false; });

    // ④ 로그인 버튼
    document.getElementById('btn-google-login').addEventListener('click', async () => {
      const btn = document.getElementById('btn-google-login');
      btn.disabled = true;
      btn.textContent = '로그인 중...';
      await Auth.signIn();
      // 에러가 나거나 팝업 취소될 경우를 대비해 일정 시간 후 버튼 복구
      setTimeout(() => {
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 48 48" width="22" height="22">...</svg> Google로 로그인`;
      }, 3000);
    });

    // ⑤ 2차 비밀번호 확인 버튼
    document.getElementById('btn-pw-verify').addEventListener('click', () => {
      const inputPw = document.getElementById('input-pw-verify').value;
      const errEl = document.getElementById('pw-verify-error');

      if (inputPw === _dbSecondaryPassword) {
        errEl.classList.add('hidden');
        Auth.markFreshLogin();
        window.location.href = _hasProfile ? '/app.html' : '/profile.html';
      } else {
        errEl.textContent = '비밀번호가 일치하지 않습니다.';
        errEl.classList.remove('hidden');
      }
    });

    // 비밀번호 입력창에서 엔터 시 전송
    document.getElementById('input-pw-verify').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-pw-verify').click();
    });

    // ⑥ 2차 비밀번호 설정 버튼
    document.getElementById('btn-pw-setup').addEventListener('click', async () => {
      const inputPw = document.getElementById('input-pw-setup').value.trim();
      const errEl = document.getElementById('pw-setup-error');
      const btn = document.getElementById('btn-pw-setup');

      if (!inputPw || inputPw.length < 4) {
        errEl.textContent = '비밀번호는 최소 4자리 이상이어야 합니다.';
        errEl.classList.remove('hidden');
        return;
      }

      try {
        errEl.classList.add('hidden');
        btn.disabled = true;
        btn.textContent = '저장 중...';

        // 기존 문서가 없을 수도 있으니 merge: true 방식으로 Set
        await db.collection('users').doc(_currentUser.uid).set({
          secondaryPassword: inputPw
        }, { merge: true });

        Auth.markFreshLogin();
        window.location.href = _hasProfile ? '/app.html' : '/profile.html';
      } catch (e) {
        errEl.textContent = '오류가 발생했습니다. 다시 시도해주세요.';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = '설정 완료';
      }
    });

    // 설정 입력창에서 엔터 시 전송
    document.getElementById('input-pw-setup').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-pw-setup').click();
    });
  </script>

  <style>
    .login-wrap {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .login-logo {
      text-align: center;
    }

    .logo-icon {
      font-size: 4rem;
      margin-bottom: 12px;
    }

    .logo-title {
      font-size: 2.5rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
    }

    .logo-subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .login-card {
      text-align: center;
    }

    .login-heading {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-desc {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 28px;
      line-height: 1.7;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px;
      background: #fff;
      color: #333;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }

    .btn-google:hover {
      background: #f5f5f5;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 255, 255, 0.15);
    }

    .btn-google:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .login-error {
      margin-top: 12px;
      padding: 10px;
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid var(--accent-red);
      border-radius: var(--radius-sm);
      color: var(--accent-red);
      font-size: 0.85rem;
      text-align: center;
    }

    .features-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
    }

    .feature-icon {
      font-size: 1.8rem;
      flex-shrink: 0;
    }

    .feature-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .feature-text strong {
      font-size: 0.85rem;
      color: var(--text-primary);
    }

    .feature-text span {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
  </style>
</body>

</html>
